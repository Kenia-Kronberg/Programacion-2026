<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registro-style.css">
    <title>Registrarse</title>
</head>
<body>
    <div class="form-container">
    <form action="" class="login">
        <h1 class="login-title">Registrarse</h1>
        
        <label for="" class="login-label">Nombre y Apellido</label>
        <input type="text" class="login-name" placeholder="Nombre y Apellido">
        
        <label for="" class="login-label">Correo (usuario)</label>
        <input type="email" class="login-user" placeholder="pepito@isbo.edu.uy">

        <label for="" class="login-label">Contraseña</label>
        <input type="password" class="login-password" placeholder="*********">

        <label for="" class="login-label">Repetir contraseña</label>
        <input type="password" class="login-rep-password" placeholder="*********">

        <label for="" class="login-label">Fecha de nacimiento</label>
        <input type="date" class="login-fecha">

        <button type="submit" class="login-button">Registrarse</button>
    <div class="link">
        <a href="IniciarSesion.html" class="linkA">Iniciar sesión aquí</a>
    </div>
    </form>
    </div>
</body>
</html>
