<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>02 - Cards</title>
    <link rel="stylesheet" href="style-card.css">
</head>

<body>
    <div class="titulo">
    <h1>Pokémon Cards</h1>
    </div>
    <main class="main-container">
        <div class="card">
            <h3 class="card-title">Pikachu</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
                    alt="Pikachu" class="card-img">
                <figcaption class="card-text">Tipo: Eléctrico</figcaption>
            </figure>
            <a href="https://pokemon.fandom.com/wiki/Pikachu" target="_blank">Ver más</a>
        </div>

        <div class="card">
            <h3 class="card-title">Eevee</h3>
